<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="upper-container">
        <h1 style="color: #b6b6ba">CASIO</h1>
        <div id="display-outline">
          <div id="display">
            <span id="display-value">54651</span>
            <span id="display-operator"></span>
          </div>
        </div>
      </div>
      <div id="buttons">
        <button class="disp wb">DISP</button>
        <button class="goto bw">GO TO</button>
        <button class="auto-review bw">AUTO REVIEW</button>
        <button class="correct bw">CORRECT</button>
        <button class="prev bw">△</button>
        <button class="after bw">▽</button>
        <button id="plusorminus" class="bw">+/-</button>
        <button class="memory_positive bw">M+</button>
        <button class="memory_negative bw">M-</button>
        <button class="mrc bw">MRC</button>
        <button class="mu bw">MU</button>
        <button class="gt bw">GT</button>
        <button class="ac bw">AC</button>
        <button class="number">7</button>
        <button class="number">8</button>
        <button class="number">9</button>
        <button class="operator percentage bw">%</button>
        <button id="root" class="bw">√</button>
        <button id="back" class="bw">▶</button>
        <button class="number">4</button>
        <button class="number">5</button>
        <button class="number">6</button>
        <button class="operator bw">X</button>
        <button class="operator bw">÷</button>
        <button id="clear" class="rw">C</button>
        <button class="number">1</button>
        <button class="number">2</button>
        <button class="number">3</button>
        <button class="operator plus bw">+</button>
        <button class="operator minus bw">-</button>
        <button class="number">0</button>
        <button class="number">00</button>
        <button class="number">000</button>
        <button class="number">.</button>
        <button id="equal" class="bw">=</button>
      </div>
    </div>
  </body>
</html>
